paths:
  trip_dir: /HUBU-AI095/xhx/1.data/gps_trajectory
  road_bundle_path: /HUBU-AI095/xhx/2.data_processing/Static_road/baoding_static_road_gnn_dataset.pt
  profile_feat_path: /HUBU-AI095/xhx/2.data_processing/traffic_gnn/mock_traffic_output_week_event/reference_graph_and_base.pt
  gnn_config: /HUBU-AI095/xhx/configs/gnn_train.yaml
  gnn_checkpoint: /HUBU-AI095/xhx/log/traffic_gnn_exp21/checkpoints/final_model.pt
  recent_speed_seq_path: null
  event_vector_path: null

model:
  bank_mode: base          # 可选: base / recent / joint
  freeze_gnn_backbone: true

  d_model: 128
  nhead: 8
  num_layers: 4
  predict_uncertainty: true

data:
  min_elapsed_min: 30.0
  step_min: 30.0
  min_remaining_min: 10.0
  topk_match: 5
  max_route_len: 256

  batch_size: 8
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  require_found_path: true
  max_match_distance_m: 80.0
  preload_and_filter: true
  max_cache_items: 20000

train:
  epochs: 10
  lr: 0.0001
  weight_decay: 0.00001
  grad_clip: 5.0
  val_ratio: 0.15

runtime:
  seed: 42
  device: auto
  output_dir: /HUBU-AI095/xhx/log
  experiment_name: samecity_eta_exp01
  strict_checkpoint: false
