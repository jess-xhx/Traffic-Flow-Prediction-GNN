# 运行方式:
# python train_sharded_compatible.py --config configs/gnn_train_sharded.yaml
# 如果你已经把 train_sharded_compatible.py 覆盖成 train.py，也可以：
# python train.py --config configs/gnn_train_sharded.yaml
#
# 说明:
# - 该配置适配 mock_traffic_output/ 这种新目录结构
# - 下面的 data.root_dir 按“配置文件放在 configs/ 目录下”来写
# - 如果你的 yaml 不在 configs/ 目录，而是在项目根目录，请把 ../mock_traffic_output 改成 ./mock_traffic_output

model:
  static_dim: 17
  profile_dim: 8
  event_dim: 6
  static_hidden_dim: 32
  calendar_hidden_dim: 32
  profile_hidden_dim: 32
  bank_hidden_dim: 64
  recent_hidden_dim: 32

data:
  root_dir: ../2.data_processing/traffic_gnn/mock_traffic_output
  train_path: null
  val_path: null
  test_path: null
  file_pattern: '*.pt'
  batch_size: 1
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  shuffle_train: true
  drop_last: false

stage1:
  epochs: 10
  lr: 0.001
  weight_decay: 0.00001
  grad_clip: 5.0
  log_every: 1

stage2:
  epochs: 10
  lr: 0.001
  weight_decay: 0.00001
  grad_clip: 5.0
  log_every: 1

stage3:
  epochs: 10
  lr: 0.001
  weight_decay: 0.00001
  grad_clip: 5.0
  log_every: 1

joint:
  epochs: 5
  lr_base: 0.0001
  lr_recent: 0.0003
  lr_event: 0.0005
  weight_decay: 0.00001
  alpha_base: 0.2
  beta_recent: 0.3
  gamma_event: 1.0
  lambda_recent_reg: 0.0001
  lambda_event_reg: 0.0001
  grad_clip: 5.0
  log_every: 1

runtime:
  seed: 42
  deterministic: false
  device: auto
  output_dir: ./log
  experiment_name: traffic_gnn_exp01
  resume_checkpoint: null
  save_every_epoch: true
  monitor: val_loss
  monitor_mode: min
  use_stage1: true
  use_stage2: true
  use_stage3: true
  use_joint: true
